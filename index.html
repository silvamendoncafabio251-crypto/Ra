<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Jornada da Raposa</title>

<style>
body{
    margin:0;
    background:#222;
    text-align:center;
}

canvas{
    border:2px solid white;
    background:linear-gradient(#87CEEB,#90EE90);
}

button{
    width:80px;
    height:50px;
    margin:5px;
    font-size:20px;
}
</style>
</head>

<body>

<h2 style="color:white">A Jornada da Raposa</h2>

<canvas id="game" width="800" height="400"></canvas>

<br>

<button id="left">⬅️</button>
<button id="jump">⬆️</button>
<button id="right">➡️</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const fox = {
    x:50,
    y:300,
    w:40,
    h:40,
    vy:0,
    grounded:true
};

let score = 0;

const coins = [
    {x:250,y:320,collected:false},
    {x:450,y:280,collected:false},
    {x:650,y:250,collected:false}
];

function drawFox(){
    ctx.fillStyle="orange";
    ctx.fillRect(fox.x,fox.y,fox.w,fox.h);
}

function drawGround(){
    ctx.fillStyle="#555";
    ctx.fillRect(0,340,800,60);
}

function drawCoins(){
    ctx.fillStyle="gold";

    coins.forEach(c=>{
        if(!c.collected){
            ctx.beginPath();
            ctx.arc(c.x,c.y,10,0,Math.PI*2);
            ctx.fill();

            if(
                fox.x < c.x+10 &&
                fox.x+fox.w > c.x-10 &&
                fox.y < c.y+10 &&
                fox.y+fox.h > c.y-10
            ){
                c.collected=true;
                score++;
            }
        }
    });
}

function update(){
    fox.vy += 0.5;
    fox.y += fox.vy;

    if(fox.y > 300){
        fox.y = 300;
        fox.vy = 0;
        fox.grounded = true;
    }

    ctx.clearRect(0,0,800,400);

    drawGround();
    drawCoins();
    drawFox();

    ctx.fillStyle="white";
    ctx.font="25px Arial";
    ctx.fillText("Moedas: "+score,10,30);

    if(score===3){
        ctx.fillStyle="yellow";
        ctx.font="70px Arial";
        ctx.fillText("VOCÊ VENCEU!",250,150);
    }

    requestAnimationFrame(update);
}

document.getElementById("left").onclick=()=>{
    fox.x-=40;
};

document.getElementById("right").onclick=()=>{
    fox.x+=40;
};

document.getElementById("jump").onclick=()=>{
    if(fox.grounded){
        fox.vy=-20;
        fox.grounded=false;
    }
};

update();
</script>

</body>
</html>
